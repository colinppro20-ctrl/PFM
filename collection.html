<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME — SHOP</title>
    <link rel="icon" type="image/x-icon" href="logos/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="logos/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="logos/favicon-180.png" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .logo-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fff;
        }

        .logo {
            width: 120px;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
        }

        .nav-strip {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5em;
        }

        .nav-strip a {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            transition: opacity 0.2s ease;
        }

        .nav-strip a:hover {
            opacity: 0.5;
        }

        .nav-strip .sep {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.6;
        }

        .grid {
            background: #000;
            border: 1px solid #000;
            border-top: none;
            display: inline-grid;
            grid-template-columns: repeat(2, 440px);
            gap: 1px;
            margin: 0;
        }

        .card {
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card-media {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f4f4f4;
        }

        .card-media img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }

        .card-media .worn {
            opacity: 0;
        }

        .card:hover .worn {
            opacity: 1;
        }

        .card:hover .flat {
            opacity: 0;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            background: #fff;
            z-index: 10;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #000000;
            transition: opacity 0.2s ease;
        }

        .menu-btn:hover {
            opacity: 0.6;
        }

        .menu-btn svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-12px);
            transition: opacity 0.35s ease, transform 0.35s ease, visibility 0s linear 0.35s;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .overlay-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.2s ease;
        }

        .overlay-close:hover {
            opacity: 0.6;
        }

        .overlay-close svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 20px;
        }

        .overlay-logo {
            width: 160px;
            height: auto;
            display: block;
            filter: invert(1);
        }

        .overlay-clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .overlay-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3em;
        }

        .overlay-nav a {
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 2rem;
            line-height: 1.5;
            letter-spacing: 0.08em;
            transition: opacity 0.2s ease;
        }

        .overlay-nav a:hover {
            opacity: 0.6;
        }

        .overlay-social {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .overlay-ig,
        .overlay-mail {
            color: #ffffff;
            display: inline-flex;
            transition: opacity 0.2s ease;
        }

        .overlay-ig:hover,
        .overlay-mail:hover {
            opacity: 0.6;
        }

        .overlay-ig svg,
        .overlay-mail svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            color: #ffffff;
        }

        .overlay-bottom a {
            color: #ffffff;
            transition: opacity 0.2s ease;
        }

        .overlay-bottom a:hover {
            opacity: 0.6;
        }

        @media (max-width: 720px) {
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                margin: 0;
            }

            .nav-strip {
                gap: 0.6em;
            }

            .nav-strip a {
                font-size: 9px;
                letter-spacing: 0.15em;
            }
        }
    </style>
</head>

<body>
    <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square">
            <line x1="2" y1="5" x2="22" y2="5" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <line x1="2" y1="19" x2="22" y2="19" />
        </svg>
    </button>

    <div class="logo-bar">
        <a href="index.html" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast.jpeg" alt="PRAY FOR ME" class="logo" />
        </a>
    </div>
    <nav class="nav-strip">
        <a href="collection.html">Shop</a>
    </nav>

    <section class="grid">
        <a class="card" href="product.html">
            <div class="card-media" style="background-color: #ffffff;">
                <img class="flat" src="images/tongs-verso.jpeg" alt="DRAMA TONGS — sole" loading="lazy" />
                <img class="worn" src="images/tongs-recto.jpeg" alt="" loading="lazy" />
            </div>
            <div class="card-meta">
                <span>DRAMA TONGS</span>
                <span>60 EUR</span>
            </div>
        </a>

        <a class="card" href="tote.html">
            <div class="card-media">
                <img class="flat" src="images/BagwBG4.jpeg" alt="Mugshot Bag" loading="lazy" />
                <img class="worn" src="images/BagwBG4.jpeg" alt="" loading="lazy" />
            </div>
            <div class="card-meta">
                <span>MUGSHOT BAG</span>
                <span>35 EUR</span>
            </div>
        </a>

    </section>

    <footer>
        <span>© Pray For Me 2002</span>
        <span>Paris</span>
    </footer>

    <div class="overlay" id="overlay" aria-hidden="true">
        <button class="overlay-close" id="overlayClose" type="button" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
                <line x1="5" y1="5" x2="19" y2="19" />
                <line x1="19" y1="5" x2="5" y2="19" />
            </svg>
        </button>

        <div class="overlay-inner">
            <img class="overlay-logo" src="logos/logotypeeverlast-removebg-preview.png" alt="PRAY FOR ME" />
            <div class="overlay-clock" id="overlayClock"></div>
            <nav class="overlay-nav">
                <a href="collection.html">shop</a>
            </nav>
            <div class="overlay-social">
                <a class="overlay-ig" href="https://instagram.com/prayforme2002" target="_blank" rel="noopener"
                    aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"
                        stroke-linejoin="miter">
                        <rect x="3" y="3" width="18" height="18" />
                        <circle cx="12" cy="12" r="4" />
                        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                    </svg>
                </a>
                <a class="overlay-mail" href="mailto:prayforme.2K2@gmail.com" aria-label="Email">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"
                        stroke-linejoin="miter">
                        <rect x="3" y="5" width="18" height="14" />
                        <path d="M3 6l9 7 9-7" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="overlay-bottom">
            <a href="terms.html">Terms</a>
            <span>© Pray For Me 2002 — All Rights Reserved</span>
            <a href="privacy.html">Privacy</a>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menuBtn');
        const overlayClose = document.getElementById('overlayClose');
        const overlayClock = document.getElementById('overlayClock');

        function updateClock() {
            const parts = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Paris',
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: true
            }).formatToParts(new Date());
            const p = {};
            parts.forEach((x) => { p[x.type] = x.value; });
            overlayClock.textContent =
                p.day + '/' + p.month + '/' + p.year + ' ' +
                p.hour + ':' + p.minute + ' ' +
                (p.dayPeriod || '').toLowerCase() + ' PAR';
        }

        function openMenu() {
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            updateClock();
        }

        function closeMenu() {
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        menuBtn.addEventListener('click', openMenu);
        overlayClose.addEventListener('click', closeMenu);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMenu();
        });

        updateClock();
        setInterval(updateClock, 60000);
    </script>
</body>

</html>
