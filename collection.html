<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME — Collection SUMMER 26</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: #ffffff;
            color: #000000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .logo-bar {
            position: relative;
            display: flex;
            align-items: center;
            padding: 20px;
            background: #fff;
        }

        .logo {
            width: 120px;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
        }

        .nav-strip {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5em;
        }

        .nav-strip a {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
        }

        .nav-strip a:hover {
            text-decoration: line-through;
        }

        .nav-strip .sep {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.6;
        }

        .grid {
            background: #000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card-media {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f4f4f4;
        }

        .card-media img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }

        .card-media .worn {
            opacity: 0;
        }

        .card:hover .worn {
            opacity: 1;
        }

        .card:hover .flat {
            opacity: 0;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            background: #fff;
            z-index: 10;
        }

        @media (max-width: 720px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .nav-strip {
                gap: 0.6em;
            }
            .nav-strip a {
                font-size: 9px;
                letter-spacing: 0.15em;
            }
        }
    </style>
</head>
<body>
    <div class="logo-bar">
        <a href="index.html" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast.jpeg" alt="PRAY FOR ME" class="logo" />
        </a>
    </div>
    <nav class="nav-strip">
        <a href="collection.html">Collection</a>
        <span class="sep">—</span>
        <a href="#">Lookbook</a>
        <span class="sep">—</span>
        <a href="#">Contact</a>
    </nav>

    <section class="grid">
        <a class="card" href="product.html">
            <div class="card-media" style="background-color: #ffffff;">
                <img class="flat" src="images/tongs-verso.jpeg" alt="DRAMA TONGS — sole" loading="lazy" />
                <img class="worn" src="images/tongs-recto.jpeg" alt="" loading="lazy" />
            </div>
            <div class="card-meta">
                <span>DRAMA TONGS</span>
                <span>€95</span>
            </div>
        </a>

        <a class="card" href="tote.html">
            <div class="card-media">
                <img class="flat" src="images/totebag.jpeg" alt="PFM Mugshot Tote" loading="lazy" />
                <img class="worn" src="images/totebag.jpeg" alt="" loading="lazy" />
            </div>
            <div class="card-meta">
                <span>PFM Mugshot Tote</span>
                <span>€120</span>
            </div>
        </a>

    </section>

    <footer>
        <span>© Pray For Me SUMMER 26</span>
        <span>Paris</span>
    </footer>
</body>
</html>
