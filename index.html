<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME — SS25</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            color: #000000;
            font-family: 'Barlow Condensed', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transform: scale(1.3);
            clip-path: inset(0 8% 6% 0);
            z-index: 0;
            pointer-events: none;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .top-bar .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #000000;
            transition: opacity 0.2s ease;
        }

        .top-bar .icon-btn:hover {
            opacity: 0.6;
        }

        .top-bar .icon-btn svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .top-logo {
            width: 110px;
            height: auto;
            display: block;
        }

        .center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .shop {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 2rem;
            line-height: 1;
            letter-spacing: 0.08em;
            color: #000000;
            background: #ffffff;
            border: 1px solid #000000;
            display: inline-block;
            padding: 0.6em 2.4em;
            cursor: pointer;
            position: relative;
            transition: opacity 0.2s ease;
        }

        .shop:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="video/video.mp4" type="video/mp4" />
    </video>

    <header class="top-bar">
        <button class="icon-btn" type="button" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>

        <a href="/" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast-removebg-preview.png" alt="PRAY FOR ME" class="top-logo" />
        </a>

        <button class="icon-btn" type="button" aria-label="Cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                <path d="M6 8h12l1 12H5L6 8z" />
                <path d="M9 8V6a3 3 0 0 1 6 0v2" />
            </svg>
        </button>
    </header>

    <div class="center">
        <a href="collection.html" class="shop">Shop</a>
    </div>
</body>
</html>
