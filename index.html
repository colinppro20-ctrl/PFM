<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME</title>
    <link rel="icon" type="image/x-icon" href="logos/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="logos/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="logos/favicon-180.png" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: 0;
            pointer-events: none;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        .top-bar .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #000000;
            transition: opacity 0.2s ease;
        }

        .top-bar .icon-btn:hover {
            opacity: 0.6;
        }

        .top-bar .icon-btn svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .top-logo {
            width: 110px;
            height: auto;
            display: block;
        }

        .center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .shop {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 2rem;
            line-height: 1;
            letter-spacing: 0.08em;
            color: #000000;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #000000;
            display: inline-block;
            padding: 0.6em 2.4em;
            cursor: pointer;
            position: relative;
            transition: opacity 0.2s ease;
        }

        .shop:hover {
            opacity: 0.6;
        }

        .radio {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
        }

        .radio-toggle {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #ffffff;
            display: inline-flex;
            transition: opacity 0.2s ease;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
        }

        .radio-toggle:hover {
            opacity: 0.6;
        }

        .radio-toggle svg {
            display: block;
            width: 18px;
            height: 18px;
        }

        .radio-toggle .icon-pause {
            display: none;
        }

        .radio.playing .icon-play {
            display: none;
        }

        .radio.playing .icon-pause {
            display: block;
        }

        .radio-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            user-select: none;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #000000;
            transition: opacity 0.2s ease;
        }

        .menu-btn:hover {
            opacity: 0.6;
        }

        .menu-btn svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-12px);
            transition: opacity 0.35s ease, transform 0.35s ease, visibility 0s linear 0.35s;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .overlay-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.2s ease;
        }

        .overlay-close:hover {
            opacity: 0.6;
        }

        .overlay-close svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 20px;
        }

        .overlay-logo {
            width: 160px;
            height: auto;
            display: block;
            filter: invert(1);
        }

        .overlay-clock {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .overlay-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3em;
        }

        .overlay-nav a {
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 2rem;
            line-height: 1.5;
            letter-spacing: 0.08em;
            transition: opacity 0.2s ease;
        }

        .overlay-nav a:hover {
            opacity: 0.6;
        }

        .overlay-social {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .overlay-ig,
        .overlay-mail {
            color: #ffffff;
            display: inline-flex;
            transition: opacity 0.2s ease;
        }

        .overlay-ig:hover,
        .overlay-mail:hover {
            opacity: 0.6;
        }

        .overlay-ig svg,
        .overlay-mail svg {
            display: block;
            width: 26px;
            height: 26px;
        }

        .overlay-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            color: #ffffff;
        }

        .overlay-bottom a {
            color: #ffffff;
            transition: opacity 0.2s ease;
        }

        .overlay-bottom a:hover {
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="video/vids.mp4" type="video/mp4" />
    </video>


    <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square">
            <line x1="2" y1="5" x2="22" y2="5" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <line x1="2" y1="19" x2="22" y2="19" />
        </svg>
    </button>

    <header class="top-bar">
        <a href="/" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast-removebg-preview.png" alt="PRAY FOR ME" class="top-logo" />
        </a>
    </header>

    <div class="center">
        <a href="collection.html" class="shop">Shop</a>
    </div>

    <div class="overlay" id="overlay" aria-hidden="true">
        <button class="overlay-close" id="overlayClose" type="button" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
                <line x1="5" y1="5" x2="19" y2="19" />
                <line x1="19" y1="5" x2="5" y2="19" />
            </svg>
        </button>

        <div class="overlay-inner">
            <img class="overlay-logo" src="logos/logotypeeverlast-removebg-preview.png" alt="PRAY FOR ME" />
            <div class="overlay-clock" id="overlayClock"></div>
            <nav class="overlay-nav">
                <a href="collection.html">shop</a>
            </nav>
            <div class="overlay-social">
                <a class="overlay-ig" href="https://instagram.com/prayforme2002" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                        <rect x="3" y="3" width="18" height="18" />
                        <circle cx="12" cy="12" r="4" />
                        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                    </svg>
                </a>
                <a class="overlay-mail" href="mailto:prayforme.2K2@gmail.com" aria-label="Email">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                        <rect x="3" y="5" width="18" height="14" />
                        <path d="M3 6l9 7 9-7" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="overlay-bottom">
            <a href="terms.html">Terms</a>
            <span>© Pray For Me 2002 — All Rights Reserved</span>
            <a href="privacy.html">Privacy</a>
        </div>
    </div>

    <div class="radio" id="radio">
        <button class="radio-toggle" id="radioToggle" type="button" aria-label="Play PFM Radio" aria-pressed="false">
            <svg class="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square" stroke-linejoin="miter">
                <path d="M6 4 L20 12 L6 20 Z" />
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="square" stroke-linejoin="miter">
                <rect x="7" y="5" width="3" height="14" />
                <rect x="14" y="5" width="3" height="14" />
            </svg>
        </button>
        <span class="radio-label">PFM Radio</span>
        <audio id="radioAudio" src="audios/track.mp3" autoplay loop preload="auto"></audio>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menuBtn');
        const overlayClose = document.getElementById('overlayClose');
        const overlayClock = document.getElementById('overlayClock');

        function updateClock() {
            const parts = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Paris',
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: true
            }).formatToParts(new Date());
            const p = {};
            parts.forEach((x) => { p[x.type] = x.value; });
            overlayClock.textContent =
                p.day + '/' + p.month + '/' + p.year + ' ' +
                p.hour + ':' + p.minute + ' ' +
                (p.dayPeriod || '').toLowerCase() + ' PAR';
        }

        function openMenu() {
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            updateClock();
        }

        function closeMenu() {
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        menuBtn.addEventListener('click', openMenu);
        overlayClose.addEventListener('click', closeMenu);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMenu();
        });

        updateClock();
        setInterval(updateClock, 60000);

        const radio = document.getElementById('radio');
        const radioToggle = document.getElementById('radioToggle');
        const radioAudio = document.getElementById('radioAudio');
        radioAudio.volume = 0.4;

        radioToggle.addEventListener('click', () => {
            if (radioAudio.paused) {
                radioAudio.play();
            } else {
                radioAudio.pause();
            }
        });

        // Keep the icon/labels in sync with actual playback (covers autoplay too)
        radioAudio.addEventListener('play', () => {
            radio.classList.add('playing');
            radioToggle.setAttribute('aria-pressed', 'true');
            radioToggle.setAttribute('aria-label', 'Pause PFM Radio');
        });
        radioAudio.addEventListener('pause', () => {
            radio.classList.remove('playing');
            radioToggle.setAttribute('aria-pressed', 'false');
            radioToggle.setAttribute('aria-label', 'Play PFM Radio');
        });

        // Attempt autoplay; if blocked, start on first interaction
        radioAudio.play().catch(() => { });
        document.addEventListener('click', () => { radioAudio.play().catch(() => { }); }, { once: true });
    </script>
</body>

</html>
