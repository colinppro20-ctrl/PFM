<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Hand-drawn rough edge filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Heavier distortion for strikethrough lines -->
    <filter id="rough-heavy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Lighter distortion for scratches -->
    <filter id="rough-scratch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.06" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- PRAY FOR — line 1, with hand-drawn letters -->
  <g filter="url(#rough)">
    <!-- P -->
    <text x="165" y="160" font-family="'Courier New', monospace" font-size="82" font-weight="700" fill="#f5f0e8" transform="rotate(-2, 165, 160)" letter-spacing="2">P</text>
    <!-- R -->
    <text x="225" y="160" font-family="'Courier New', monospace" font-size="78" font-weight="700" fill="#f5f0e8" transform="rotate(3, 225, 160)">R</text>
    <!-- A -->
    <text x="283" y="160" font-family="'Courier New', monospace" font-size="85" font-weight="700" fill="#f5f0e8" transform="rotate(-1, 283, 160)">A</text>
    <!-- Y -->
    <text x="348" y="160" font-family="'Courier New', monospace" font-size="76" font-weight="700" fill="#f5f0e8" transform="rotate(2, 348, 160)">Y</text>
    <!-- space -->
    <!-- F -->
    <text x="435" y="160" font-family="'Courier New', monospace" font-size="80" font-weight="700" fill="#f5f0e8" transform="rotate(-3, 435, 160)">F</text>
    <!-- O -->
    <text x="497" y="160" font-family="'Courier New', monospace" font-size="84" font-weight="700" fill="#f5f0e8" transform="rotate(1, 497, 160)">O</text>
    <!-- R -->
    <text x="563" y="160" font-family="'Courier New', monospace" font-size="79" font-weight="700" fill="#f5f0e8" transform="rotate(-2, 563, 160)">R</text>
  </g>

  <!-- Strikethrough lines over PRAY FOR — hand-drawn, thick, slightly diagonal -->
  <g filter="url(#rough-heavy)">
    <!-- Strike 1 — main thick line -->
    <line x1="148" y1="142" x2="620" y2="138" stroke="#f5f0e8" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Strike 2 — slightly lower, different angle -->
    <line x1="155" y1="152" x2="615" y2="148" stroke="#f5f0e8" stroke-width="3.2" stroke-linecap="round" opacity="0.7"/>
    <!-- Strike 3 — short aggressive slash -->
    <line x1="200" y1="136" x2="560" y2="156" stroke="#f5f0e8" stroke-width="3.8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- ME — line 2, larger, centered, added-after effect -->
  <g filter="url(#rough)">
    <!-- M -->
    <text x="290" y="310" font-family="'Courier New', monospace" font-size="130" font-weight="900" fill="#f5f0e8" transform="rotate(-1, 290, 310)">M</text>
    <!-- E -->
    <text x="410" y="310" font-family="'Courier New', monospace" font-size="125" font-weight="900" fill="#f5f0e8" transform="rotate(2, 410, 310)">E</text>
  </g>

  <!-- Ink scratches and scribble marks -->
  <g filter="url(#rough-scratch)">
    <!-- Scratch near P -->
    <line x1="155" y1="100" x2="170" y2="110" stroke="#f5f0e8" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="158" y1="105" x2="175" y2="98" stroke="#f5f0e8" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>

    <!-- Scribble near Y -->
    <path d="M 370 100 Q 375 95 380 102 Q 385 108 390 100" stroke="#f5f0e8" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Scratch near F -->
    <line x1="430" y1="170" x2="445" y2="178" stroke="#f5f0e8" stroke-width="1.1" stroke-linecap="round" opacity="0.35"/>

    <!-- Small correction marks near PRAY — like erased attempts -->
    <path d="M 240 105 L 245 98 L 250 106" stroke="#f5f0e8" stroke-width="0.9" fill="none" opacity="0.25"/>

    <!-- Ink splatter dots -->
    <circle cx="600" cy="130" r="1.5" fill="#f5f0e8" opacity="0.3"/>
    <circle cx="180" cy="175" r="1.2" fill="#f5f0e8" opacity="0.25"/>
    <circle cx="540" cy="170" r="1.8" fill="#f5f0e8" opacity="0.2"/>

    <!-- Scribble under ME — like an underline correction -->
    <path d="M 285 330 Q 330 340 370 332 Q 410 325 460 335 Q 490 340 510 330" stroke="#f5f0e8" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Small x mark / correction mark -->
    <line x1="620" y1="280" x2="632" y2="292" stroke="#f5f0e8" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
    <line x1="632" y1="280" x2="620" y2="292" stroke="#f5f0e8" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

    <!-- Another scratch cluster -->
    <line x1="190" y1="270" x2="198" y2="262" stroke="#f5f0e8" stroke-width="0.9" stroke-linecap="round" opacity="0.2"/>
    <line x1="193" y1="268" x2="200" y2="275" stroke="#f5f0e8" stroke-width="0.7" stroke-linecap="round" opacity="0.2"/>

    <!-- Caret insertion mark (^) near ME — like it was added after -->
    <path d="M 360 215 L 370 200 L 380 215" stroke="#f5f0e8" stroke-width="1.3" fill="none" opacity="0.35"/>
  </g>
</svg>
