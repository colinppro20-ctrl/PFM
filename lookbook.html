<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME — Lookbook SUMMER 26</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: #ffffff;
            color: #000000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .logo-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #fff;
        }

        .logo {
            width: 120px;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
        }

        .nav-strip {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5em;
        }

        .nav-strip a {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            transition: opacity 0.2s ease;
        }

        .nav-strip a:hover {
            opacity: 0.5;
        }

        .nav-strip .sep {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.6;
        }

        .lookbook {
            display: block;
        }

        .look {
            display: block;
        }

        .look img {
            display: block;
            width: 100vw;
            aspect-ratio: 4 / 3;
            object-fit: cover;
        }

        .look-caption {
            padding: 8px 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            background: #fff;
            z-index: 10;
        }

        @media (max-width: 720px) {
            .nav-strip {
                gap: 0.6em;
            }
            .nav-strip a {
                font-size: 9px;
                letter-spacing: 0.15em;
            }
        }
    </style>
</head>
<body>
    <div class="logo-bar">
        <a href="index.html" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast.jpeg" alt="PRAY FOR ME" class="logo" />
        </a>
    </div>
    <nav class="nav-strip">
        <a href="collection.html">Collection</a>
        <span class="sep">—</span>
        <a href="lookbook.html">Lookbook</a>
        <span class="sep">—</span>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="lookbook">
        <figure class="look">
            <img src="images-lookbook/look-2.png" alt="PFM MUGSHOT TOTE — SUMMER 26" loading="lazy" />
            <figcaption class="look-caption">PFM MUGSHOT TOTE — SUMMER 26</figcaption>
        </figure>
    </section>

    <footer>
        <span>© Pray For Me SUMMER 26</span>
        <span>Paris</span>
    </footer>
</body>
</html>
