<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAY FOR ME — DRAMA TONGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: #ffffff;
            color: #000000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding-bottom: 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .logo-bar {
            position: relative;
            display: flex;
            align-items: center;
            padding: 20px;
            background: #fff;
        }

        .logo {
            width: 120px;
            height: auto;
            display: block;
            mix-blend-mode: multiply;
        }

        .nav-strip {
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 10px 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5em;
        }

        .nav-strip a {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
        }

        .nav-strip a:hover {
            text-decoration: line-through;
        }

        .nav-strip .sep {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.6;
        }

        .product {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .media {
            position: relative;
            background: #ffffff;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            border-right: 1px solid #000;
        }

        .media img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }

        .media .worn {
            opacity: 0;
        }

        .media.show-worn .worn {
            opacity: 1;
        }

        .media.show-worn .flat {
            opacity: 0;
        }

        .info {
            padding: 48px 56px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .name {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 2.5vw;
            line-height: 1.05;
            letter-spacing: 0.02em;
        }

        .price {
            font-size: 14px;
            letter-spacing: 0.2em;
            font-weight: 700;
        }

        .rule {
            border: none;
            border-top: 1px solid #000;
            height: 0;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
        }

        .sizes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size {
            width: 40px;
            height: 40px;
            border: 1px solid #000;
            border-radius: 0;
            background: #fff;
            color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: none;
        }

        .size.one-size {
            width: auto;
            padding: 0 16px;
            letter-spacing: 0.2em;
        }

        .size:hover {
            background: #000;
            color: #fff;
        }

        .size.selected {
            background: #000;
            color: #fff;
        }

        .add-to-cart {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            border-radius: 0;
            padding: 16px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.2em;
            cursor: pointer;
        }

        .add-to-cart:hover {
            background: #fff;
            color: #000;
            border: 1px solid #000;
        }

        .final {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: center;
            font-weight: 700;
        }

        .desc {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.8;
            font-weight: 400;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            background: #fff;
            z-index: 10;
        }

        @media (max-width: 720px) {
            .product {
                grid-template-columns: 1fr;
            }
            .media {
                border-right: none;
                border-bottom: 1px solid #000;
            }
            .info {
                padding: 32px 24px;
            }
            .name {
                font-size: 28px;
            }
            .nav-strip {
                gap: 0.6em;
            }
            .nav-strip a {
                font-size: 9px;
                letter-spacing: 0.15em;
            }
        }
    </style>
</head>
<body>
    <div class="logo-bar">
        <a href="index.html" aria-label="Pray For Me">
            <img src="logos/logotypeeverlast.jpeg" alt="PRAY FOR ME" class="logo" />
        </a>
    </div>
    <nav class="nav-strip">
        <a href="collection.html">Collection</a>
        <span class="sep">—</span>
        <a href="#">Lookbook</a>
        <span class="sep">—</span>
        <a href="#">Contact</a>
    </nav>

    <section class="product">
        <div class="media" id="media">
            <img class="flat" src="images/tongs-verso.jpeg" alt="DRAMA TONGS — sole" />
            <img class="worn" src="images/tongs-recto.jpeg" alt="DRAMA TONGS — worn" />
        </div>

        <div class="info">
            <h1 class="name">DRAMA TONGS</h1>
            <div class="price">€95</div>

            <hr class="rule" />

            <div class="label">Size</div>
            <div class="sizes">
                <button type="button" class="size">36</button>
                <button type="button" class="size">37</button>
                <button type="button" class="size">38</button>
                <button type="button" class="size">39</button>
                <button type="button" class="size">40</button>
                <button type="button" class="size">41</button>
                <button type="button" class="size">42</button>
                <button type="button" class="size">43</button>
                <button type="button" class="size">44</button>
                <button type="button" class="size">45</button>
                <button type="button" class="size">46</button>
            </div>

            <hr class="rule" />

            <button type="button" class="add-to-cart">Add to Cart</button>
            <div class="final">All Sales Final</div>

            <p class="desc">
                Rubber thong sandal. Moulded footbed with embossed PFM
                logotype. Magazine-print strap. Made in Italy. Unisex.
                One size — runs true. Final sale, no returns, no prayers
                answered.
            </p>
        </div>
    </section>

    <footer>
        <span>© Pray For Me SUMMER 26</span>
        <span>Paris</span>
    </footer>

    <script>
        const media = document.getElementById('media');
        media.addEventListener('click', () => {
            media.classList.toggle('show-worn');
        });

        const sizes = document.querySelectorAll('.size');
        sizes.forEach((s) => {
            s.addEventListener('click', () => {
                sizes.forEach((o) => o.classList.remove('selected'));
                s.classList.add('selected');
            });
        });
    </script>
</body>
</html>
